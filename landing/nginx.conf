server {
    listen       80;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # -------- Security headers --------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "interest-cohort=()" always;

    # -------- Static asset caching --------
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # -------- UnityChat install page (case-insensitive main URL) --------
    # Matches exactly /UnityChat, /unitychat, /UNITYCHAT, etc. (with or without trailing slash)
    location ~* ^/unitychat/?$ {
        try_files /unitychat/index.html =404;
    }

    # UnityChat assets served from lowercase path (referenced from HTML in lowercase)
    location /unitychat/ {
        try_files $uri $uri/ /unitychat/index.html;
    }

    # -------- Download area --------
    # Explicit rule for the ZIP so it always downloads with a nice name.
    location = /download/unitychat.zip {
        add_header Content-Disposition 'attachment; filename="unitychat.zip"' always;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # manifest.json + any other download asset
    location /download/ {
        add_header Cache-Control "public, max-age=120" always;
        try_files $uri =404;
    }

    # -------- Root: under construction landing --------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=300";
    }

    # -------- gzip --------
    gzip              on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary         on;
}
