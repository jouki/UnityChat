<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>UnityChat - Backup & Restore</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0e0e10;
    color: #efeff1;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    background: #18181b;
    border: 1px solid #303032;
    border-radius: 12px;
    padding: 32px;
    max-width: 480px;
    width: 100%;
  }
  h1 {
    font-size: 20px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #f5a623, #ff6b00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub { color: #adadb8; font-size: 13px; margin-bottom: 24px; }
  .section { margin-bottom: 24px; }
  .section h2 { font-size: 15px; margin-bottom: 8px; }
  .section p { font-size: 13px; color: #adadb8; margin-bottom: 12px; }
  button {
    display: inline-block;
    padding: 10px 24px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-export {
    background: linear-gradient(135deg, #f5a623, #ff6b00);
    color: #000;
  }
  .btn-import {
    background: #303032;
    color: #efeff1;
  }
  input[type="file"] { display: none; }
  .status {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 13px;
    display: none;
  }
  .status.ok { display: block; background: #1a3a1a; border: 1px solid #2d5a2d; color: #6fcf6f; }
  .status.err { display: block; background: #3a1a1a; border: 1px solid #5a2d2d; color: #cf6f6f; }
  .status.info { display: block; background: #1a2a3a; border: 1px solid #2d4a5a; color: #6faacf; }
  .details { margin-top: 12px; font-size: 12px; color: #adadb8; }
  .details code { color: #f5a623; }
</style>
</head>
<body>
<div class="container">
  <h1>UnityChat Backup</h1>
  <p class="sub" id="ver"></p>

  <div class="section">
    <h2>Export</h2>
    <p>Stahne JSON se vším: config, message cache, nicknames, barvy.</p>
    <button class="btn-export" id="btnExport">Exportovat data</button>
  </div>

  <div class="section">
    <h2>Import</h2>
    <p>Nahraje data z JSON souboru zpět do extensionu.</p>
    <button class="btn-import" id="btnImport">Importovat ze souboru</button>
    <input type="file" id="fileInput" accept=".json">
  </div>

  <div class="status" id="status"></div>
  <div class="details" id="details"></div>
</div>

<script src="backup.js"></script>
</body>
</html>
