<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnityChat</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Header -->
  <div id="header">
    <div id="header-title">&#9889; UnityChat</div>
    <div id="header-actions">
      <div id="update-wrap" class="hidden">
        <button id="btn-update" title="Nová verze k dispozici" aria-label="Nová verze">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true">
            <path d="M12 2v10l4-4 1.41 1.41L12 14.83 6.59 9.41 8 8l4 4V2h0zM20 18v2H4v-2h16z"/>
          </svg>
          <span class="update-dot" aria-hidden="true"></span>
        </button>
        <div id="update-tooltip" class="update-tooltip">
          <div class="ut-title">Nová verze k dispozici</div>
          <div class="ut-version">v<span id="ut-version-num">?</span></div>
          <div class="ut-text">
            Můžeš updatovat pomocí <code>update.bat</code> ve složce extensionu,
            nebo si stáhni <a id="ut-download-link" href="https://jouki.cz/download/unitychat.zip" target="_blank" rel="noopener">novou verzi</a>.
          </div>
          <div class="ut-explorer" aria-hidden="true">
            <div class="ut-exp-path">&#128193; extension</div>
            <ul class="ut-exp-list">
              <li>&#128196; background.js</li>
              <li>&#128196; sidepanel.html</li>
              <li>&#128196; sidepanel.js</li>
              <li>&#128196; manifest.json</li>
              <li class="ut-exp-highlight">&#128196; update.bat <span class="ut-exp-arrow">&#11013;</span></li>
            </ul>
          </div>
        </div>
      </div>
      <button id="btn-popout" title="Otevřít v samostatném okně">&#10548;</button>
      <button id="btn-dump" title="Stáhnout debug log">&#128190;</button>
      <button id="btn-settings" title="Nastavení">&#9881;</button>
    </div>
  </div>

  <!-- Settings Panel -->
  <div id="settings" class="hidden">
    <details class="settings-section" id="channels-section">
      <summary>
        <span>Kanály</span>
        <button id="btn-im-streamer" class="btn-streamer-inline" title="Otevřít stránku pro přihlášení streamera">Jsem streamer</button>
      </summary>
      <div class="setting-row">
        <label for="input-channel">Twitch</label>
        <input type="text" id="input-channel" value="robdiesalot" spellcheck="false" autocomplete="off" readonly title="Nastaveno automaticky z aktivního tabu">
      </div>
      <div class="setting-row">
        <label for="input-kick-channel">Kick</label>
        <input type="text" id="input-kick-channel" value="robdiesalot" spellcheck="false" autocomplete="off" readonly title="Nastaveno automaticky z aktivního tabu">
      </div>
      <div class="setting-row">
        <label for="input-yt-channel">YouTube</label>
        <input type="text" id="input-yt-channel" value="robdiesalot" placeholder="Název kanálu nebo @handle" spellcheck="false" autocomplete="off" readonly title="Nastaveno automaticky z aktivního tabu">
      </div>
    </details>
    <div class="setting-row">
      <label for="input-username">USERNAME (TWITCH)</label>
      <input type="text" id="input-username" placeholder="Detekováno automaticky" spellcheck="false" autocomplete="off" readonly>
    </div>
    <div class="setting-row">
      <label for="input-nickname">UnityChat přezdívka</label>
      <input type="text" id="input-nickname" placeholder="Vlastní přezdívka" maxlength="30" spellcheck="false" autocomplete="off">
      <label for="input-color-hex" class="color-label">Barva jména</label>
      <div class="color-row">
        <input type="color" id="input-color-picker" value="#ff8c00">
        <input type="text" id="input-color-hex" placeholder="#ff8c00" maxlength="7" spellcheck="false" autocomplete="off">
      </div>
      <div class="save-row">
        <button id="btn-nickname" class="btn-nick">Uložit</button>
      </div>
      <span id="nickname-status" class="nick-status"></span>
    </div>
    <div class="setting-row">
      <label for="input-layout">Velikost layoutu</label>
      <select id="input-layout">
        <option value="small">Malá</option>
        <option value="medium">Střední</option>
        <option value="large">Velká</option>
      </select>
    </div>
    <div class="setting-row actions">
      <button id="btn-connect" class="btn-primary" title="Znovu se připojit ke všem dostupným chatům aktuálního streamera">Připojit</button>
      <button id="btn-disconnect">Odpojit</button>
      <button id="btn-clear">Vyčistit chat</button>
    </div>
    <div class="setting-row dev-mode-row">
      <label class="platform-check">
        <input type="checkbox" id="chk-devmode">
        Dev mode
      </label>
      <div class="author-stack">
        <a href="https://jouki.cz" target="_blank" rel="noopener" class="author-link" title="Autor: Jouki — jouki.cz">
          <span class="author-by">by</span> <span class="author-name">Jouki</span>
        </a>
        <a href="https://ko-fi.com/jouki" target="_blank" rel="noopener" class="kofi-link" title="Support on Ko-fi">☕ Kup mi Ko-fičko</a>
      </div>
    </div>
    <div id="dev-tools" class="setting-row dev-tools hidden">
      <button id="btn-dump-cache">Stáhnout message cache</button>
      <button id="btn-dump-nicknames">Stáhnout nickname cache</button>
      <button id="btn-clear-cache">Smazat message cache</button>
    </div>
  </div>

  <!-- Status + Filter Bar -->
  <div id="bar">
    <div id="statuses">
      <span class="st" id="st-twitch" title="Twitch"><span class="dot"></span>TW</span>
      <span class="st" id="st-youtube" title="YouTube"><span class="dot"></span>YT</span>
      <span class="st" id="st-kick" title="Kick"><span class="dot"></span>KI</span>
    </div>
    <div id="filters">
      <button class="fbtn active" data-platform="twitch">TW</button>
      <button class="fbtn active" data-platform="youtube">YT</button>
      <button class="fbtn active" data-platform="kick">KI</button>
    </div>
  </div>

  <!-- Pinned message banner -->
  <div id="pinned-banner" class="hidden"></div>

  <!-- Chat -->
  <div id="chat-wrapper">
    <div id="chat"></div>
    <button id="btn-scroll" class="hidden">&darr; Nové zprávy</button>
  </div>

  <!-- Input pro odesílání zpráv -->
  <div id="input-area">
    <span id="active-badge" class="badge">--</span>
    <textarea id="msg-input" rows="1" placeholder="Otevři stream pro odesílání..." autocomplete="off" spellcheck="false" disabled></textarea>
    <button id="btn-send" disabled>&#10148;</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
